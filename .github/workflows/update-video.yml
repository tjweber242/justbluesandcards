name: Update Latest YouTube Video

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest video ID
        id: getvideo
        run: python3 get_video.py

      - name: Update index.html with new video ID
        run: |
          VIDEO_ID="${{ steps.getvideo.outputs.video_id }}"
          echo "Updating with video ID: $VIDEO_ID"
          sed -i "s|youtube\.com/embed/[A-Za-z0-9_-]*|youtube.com/embed/${VIDEO_ID}|g" index.html
          sed -i "s|LATEST_VIDEO_ID|${VIDEO_ID}|g" index.html
          echo "Result:"
          grep -i "embed" index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged
          git commit -m "Auto-update: latest YouTube episode" || echo "Nothing to commit"
          git push || echo "Nothing to push"
