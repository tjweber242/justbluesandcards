<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join the Show · Just Blues & Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d2b6b 0%, #1565c0 30%, #6a0f0f 70%, #c62828 100%);
      position: relative;
      overflow: hidden;
      padding: 24px;
    }

    /* vertical line texture */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(90deg, transparent, transparent 48px, rgba(255,255,255,0.03) 48px, rgba(255,255,255,0.03) 50px);
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 52px 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 24px;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.25), 0 8px 24px rgba(0,0,0,0.4);
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.1em;
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .subtitle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.55);
      margin-bottom: 36px;
      text-transform: uppercase;
    }

    .join-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #ffffff;
      color: #0d2b6b;
      font-family: 'Anton', sans-serif;
      font-size: 22px;
      letter-spacing: 0.08em;
      text-decoration: none;
      padding: 18px 40px;
      border-radius: 99px;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .join-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }

    .join-btn svg {
      width: 24px;
      height: 24px;
      fill: #0d2b6b;
      flex-shrink: 0;
    }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      line-height: 1.6;
    }

    .back {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }
    .back:hover { color: rgba(255,255,255,0.8); }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="Just Blues and Cards Logo.png" alt="Just Blues & Cards" onerror="this.src='Just%20Blues%20and%20Cards%20Logo.png'" />
    <div class="title">Join the Show</div>
    <div class="subtitle">Just Blues & Cards · Live Co-Host</div>

    <a class="join-btn" href="https://vdo.ninja/?room=justbluesandcardspod" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.277A1 1 0 0 1 21 8.618v6.764a1 1 0 0 1-1.447.894L15 14v-4zM3 8a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8z"/></svg>
      Join the Stream
    </a>

    <p class="note">You'll be connected live on air.<br>Make sure your mic and camera are ready!</p>
    <a class="back" href="/">← Back to Just Blues & Cards</a>
  </div>
</body>
</html>
